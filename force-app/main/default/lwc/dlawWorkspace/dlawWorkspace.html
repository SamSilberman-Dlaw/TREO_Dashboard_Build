<template>
    <div class="dlaw-workspace">

        <!-- ── 2px loading track (top-edge shimmer, no real estate cost) ── -->
        <div class="load-track">
            <template if:false={isReady}>
                <div class="load-fill"></div>
            </template>
        </div>

        <!-- ── Single combined bar: brand + tabs + user identity ─────────── -->
        <div class="workspace-bar">

            <div class="bar-brand" aria-label="D.Law">
                <span class="brand-glyph">⚖</span>
                <span class="brand-name">D.LAW</span>
            </div>

            <div class="bar-divider"></div>

            <nav class="bar-tabs" role="tablist" aria-label="D.Law Workspace Navigation">

                <template if:true={showOperations}>
                    <button class={operationsTabClass}
                            role="tab"
                            data-tab="operations"
                            aria-selected={isOperationsActive}
                            title="Operations Console"
                            onclick={handleTabClick}>
                        <span class="tab-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
                            </svg>
                        </span>
                        <span class="tab-label">Operations</span>
                    </button>
                </template>

                <template if:true={showTimeEntry}>
                    <button class={timeEntryTabClass}
                            role="tab"
                            data-tab="timeEntry"
                            aria-selected={isTimeEntryActive}
                            title="Time Entry"
                            onclick={handleTabClick}>
                        <span class="tab-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/>
                            </svg>
                        </span>
                        <span class="tab-label">Time Entry</span>
                    </button>
                </template>

                <template if:true={showCalendar}>
                    <button class={calendarTabClass}
                            role="tab"
                            data-tab="calendar"
                            aria-selected={isCalendarActive}
                            title="Calendar &amp; Events"
                            onclick={handleTabClick}>
                        <span class="tab-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 3h-1V1h-2v2H8V1H6v2H5C3.9 3 3 3.9 3 5v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z"/>
                            </svg>
                        </span>
                        <span class="tab-label">Calendar</span>
                    </button>
                </template>

            </nav>

            <div class="bar-fill"></div>

            <template if:true={isReady}>
                <div class="bar-user" title={profileName}>
                    <span class="bar-user-dot"></span>
                    <span class="bar-user-name">{firstName}</span>
                    <span class="bar-user-role">{profileBadgeLabel}</span>
                </div>
            </template>

        </div>

        <!-- ── Tab panels (CSS-toggled to preserve child state) ──────────── -->
        <template if:true={isReady}>
            <div class="workspace-body">

                <template if:true={showOperations}>
                    <div class={operationsPanelClass} role="tabpanel" aria-label="Operations Console">
                        <c-dlaw-operations-console></c-dlaw-operations-console>
                    </div>
                </template>

                <template if:true={showTimeEntry}>
                    <div class={timeEntryPanelClass} role="tabpanel" aria-label="Time Entry">
                        <c-time-entry-dashboard></c-time-entry-dashboard>
                    </div>
                </template>

                <template if:true={showCalendar}>
                    <div class={calendarPanelClass} role="tabpanel" aria-label="Calendar and Events">
                        <c-calendar-event-dashboard></c-calendar-event-dashboard>
                    </div>
                </template>

            </div>
        </template>

    </div>
</template>
